<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo - Studio Stephanie Sena</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T2XMTXZ81M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-T2XMTXZ81M');
  </script>
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-header {
      background: var(--dourado);
      color: var(--preto);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: center;
    }
    .admin-header h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .admin-header p {
      margin: 10px 0 0 0;
      opacity: 0.9;
    }
    .login-section {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .login-section h2 {
      text-align: center;
      margin-bottom: 20px;
      color: var(--preto);
    }
    .login-form input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 15px;
      transition: border-color 0.3s;
    }
    .login-form input:focus {
      outline: none;
      border-color: var(--dourado);
    }
    .login-form button {
      width: 100%;
      padding: 12px;
      background: var(--dourado);
      color: var(--preto);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .login-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    }
    .filter-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 10px 20px;
      border: 2px solid var(--dourado);
      background: white;
      color: var(--preto);
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }
    .filter-btn:hover {
      background: var(--dourado);
      transform: translateY(-2px);
    }
    .filter-btn.active {
      background: var(--dourado);
      color: var(--preto);
    }
    .bookings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }
    .booking-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .booking-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .booking-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }
    .booking-date {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--preto);
    }
    .booking-status {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-pendente {
      background: #fff3cd;
      color: #856404;
    }
    .status-confirmado {
      background: #d4edda;
      color: #155724;
    }
    .status-aguardando_pagamento {
      background: #fff3cd;
      color: #856404;
    }
    .status-cancelado {
      background: #f8d7da;
      color: #721c24;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 5px 0;
    }
    .info-label {
      font-weight: 500;
      color: #666;
    }
    .info-value {
      padding: 12px;
      background: var(--dourado);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loginSection" class="login-section">
    <h2 style="text-align: center; margin-bottom: 30px;">🔐 Acesso Administrativo</h2>
    <form id="loginForm">
      <input type="password" id="adminPassword" class="login-input" placeholder="Senha de acesso" required>
      <button type="submit" class="login-btn">Entrar</button>
    </form>
  </div>

  <div id="adminPanel" class="admin-container hidden">
    <header class="admin-header">
      <h1>📅 Painel Administrativo - Studio Stephanie Sena</h1>
      <p>Gerencie todos os agendamentos em um só lugar</p>
    </header>

    <div class="calendar-view">
      <h2>📋 Filtros</h2>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="hoje">Hoje</button>
        <button class="filter-btn" data-filter="semana">Esta Semana</button>
        <button class="filter-btn" data-filter="pendente">Pendentes</button>
        <button class="filter-btn" data-filter="confirmado">Confirmados</button>
        <button class="filter-btn" data-filter="cancelado">Cancelados</button>
      </div>

      <div id="bookingsList">
        <p style="text-align: center; color: #6b7280;">Carregando agendamentos...</p>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
